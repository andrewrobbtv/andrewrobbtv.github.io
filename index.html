<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#161616">
  <meta property="og:title" content="ANDREWROBB.TV">
  <meta property="og:image" content="images/AndrewRobb_SocialImage.jpg">
  <meta property="og:url" content="https://www.andrewrobb.tv/">
  <meta property="og:type" content="website">
  <title>ANDREWROBB.TV</title>
  <link rel="icon" href="images/AndrewRobb_Favicon_Light.png" media="(prefers-color-scheme: light)">
  <link rel="icon" href="images/AndrewRobb_Favicon_Dark.png" media="(prefers-color-scheme: dark)">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #161616;
      overflow: hidden;
    }

    .video-wrap {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    .video-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
    }

    .video-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    .logo-wrap {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
    }

    /* Inner wrapper is the bounce target */
    .logo-inner {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    #logo-canvas {
      width: 100vw;
      height: auto;
      pointer-events: none;
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.5s ease; /* duration overridden in JS */
    }

    /* Radial glow behind logo */
    .logo-inner::before {
      content: '';
      position: absolute;
      width: 80vw;
      height: 80vw;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.5) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }
  </style>
</head>
<body>
  <div class="video-wrap">
    <video role="presentation" aria-hidden="true" autoplay loop muted playsinline disablepictureinpicture controlslist="nodownload nofullscreen noremoteplayback">
      <source src="images/AndrewRobb_AnotherStaircase.mp4" type="video/mp4">
    </video>
  </div>

  <div class="vignette"></div>

  <div class="logo-wrap">
    <div class="logo-inner">
      <canvas id="logo-canvas" role="img" aria-label="Logo and logo animation for Andrew Robb"></canvas>
    </div>
  </div>

  <script>
    const bgVideo = document.querySelector('.video-wrap video');
    const canvas = document.getElementById('logo-canvas');
    const ctx = canvas.getContext('2d');

    // Load PNG sequence
    const FRAME_COUNT = 50;
    const FRAME_START = 7;
    const FRAME_RATE = 30;
    const frames = [];
    let framesLoaded = 0;

    function padded(n) {
      return String(n).padStart(3, '0');
    }

    const frameLoadPromise = new Promise(resolve => {
      for (let i = 0; i < FRAME_COUNT; i++) {
        const img = new Image();
        img.src = `images/PNGSequence/AndrewRobb_Logo_${padded(FRAME_START + i)}.png`;
        img.onload = () => {
          framesLoaded++;
          if (framesLoaded === 1) {
            // Set canvas size from first frame
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
          }
          if (framesLoaded === FRAME_COUNT) resolve();
        };
        frames[i] = img;
      }
    });

    function videoReady(video) {
      return new Promise(resolve => {
        if (video.readyState >= 3) return resolve();
        video.addEventListener('canplaythrough', resolve, { once: true });
      });
    }

    // Play PNG sequence on canvas, returns a promise that resolves when done
    function playSequence() {
      return new Promise(resolve => {
        let currentFrame = 0;
        const interval = 1000 / FRAME_RATE;
        let lastTime = null;

        function step(timestamp) {
          if (!lastTime) lastTime = timestamp;
          const elapsed = timestamp - lastTime;

          if (elapsed >= interval) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(frames[currentFrame], 0, 0);
            lastTime = timestamp - (elapsed % interval);
            currentFrame++;
            if (currentFrame >= FRAME_COUNT) {
              return resolve();
            }
          }
          requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      });
    }

    Promise.all([videoReady(bgVideo), frameLoadPromise]).then(() => {
      setTimeout(() => {

        // 1. Fade in background video
        document.querySelector('.video-wrap').style.opacity = '1';

        // 2. After short offset, play and show logo (overlapping with bg fade)
        setTimeout(() => {
          const animDuration = Math.round(FRAME_COUNT / FRAME_RATE * 1000);
          const vignette = document.querySelector('.vignette');
          vignette.style.transition = `opacity ${animDuration}ms ease`;
          vignette.style.opacity = '1';
          document.querySelector('.logo-wrap').style.opacity = '1';
          playSequence();
        }, 750);

      }, 1000);
    });

    // === ELASTIC OVERSCROLL ===
    let currentY = 0;
    let velocity = 0;

    const baseStiffness = 0.06;
    const baseDamping = 0.65;

    window.addEventListener('wheel', e => {
      const speedFactor = Math.min(Math.abs(e.deltaY) / 50, 3);
      velocity += e.deltaY * 0.08 * speedFactor;
    }, { passive: true });

    let lastTouchY = 0;
    let touchVelocity = 0;
    let lastTouchTime = 0;

    window.addEventListener('touchstart', e => {
      lastTouchY = e.touches[0].clientY;
      lastTouchTime = Date.now();
      touchVelocity = 0;
    }, { passive: true });

    window.addEventListener('touchmove', e => {
      const now = Date.now();
      const delta = lastTouchY - e.touches[0].clientY;
      const dt = Math.max(now - lastTouchTime, 1);
      touchVelocity = delta / dt * 16;
      lastTouchY = e.touches[0].clientY;
      lastTouchTime = now;
      const speedFactor = Math.min(Math.abs(touchVelocity) / 5, 3);
      velocity += touchVelocity * 0.08 * speedFactor;
    }, { passive: true });

    window.addEventListener('touchend', () => {
      velocity += touchVelocity * 0.3;
    }, { passive: true });

    function animateBounce() {
      const displacement = Math.abs(currentY);
      const dynamicStiffness = baseStiffness * (1 + displacement / 200);
      const dynamicDamping = baseDamping - Math.min(displacement / 800, 0.1);
      const force = -currentY * dynamicStiffness;
      velocity += force;
      velocity *= dynamicDamping;
      currentY += velocity;
      const speed = Math.abs(velocity);
      const stretch = 1 + Math.min(speed * 0.004, 0.12);
      const squash = 1 - Math.min(speed * 0.002, 0.06);
      const scaleX = velocity > 0 ? squash : stretch;
      const scaleY = velocity > 0 ? stretch : squash;
      document.querySelector('.logo-inner').style.transform =
        `translateY(${-currentY}px) scaleX(${scaleX}) scaleY(${scaleY})`;
      requestAnimationFrame(animateBounce);
    }
    animateBounce();

    // Resume background video when user returns to tab
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) bgVideo.play();
    });

    // Block right-click
    document.addEventListener('contextmenu', e => e.preventDefault());

    // Block Ctrl/Cmd + S
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') e.preventDefault();
    });
  </script>
</body>
</html>
